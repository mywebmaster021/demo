<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Payment</title>
    <style>
        .payment-button {
            display: inline-block;
            padding: 15px 25px;
            background-color: #f26522; /* Button color */
            color: white; /* Text color */
            text-decoration: none; /* Remove underline */
            border-radius: 5px; /* Rounded corners */
            font-size: 16px; /* Font size */
            text-align: center;
            border: none; /* No border */
            cursor: pointer; /* Pointer cursor */
        }

        .payment-button:hover {
            background-color: black; /* Button hover color */
        }
    </style>
</head>
<body onload="openUPI()">

<button class="payment-button" onclick="openUPI()">Pay Now</button>

<script>
    function openUPI() {
        const upiLink = 'upi://pay?pa=8249210153@upi&pn=wwe&am=1000&cu=INR';
        window.location.href = upiLink; // Redirects to UPI payment app
    }
</script>

</body>
</html>
