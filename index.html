<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Option</title>
    <style>
        .payment-button {
            background-color: #f26522; /* Button color */
            color: white; /* Text color */
            padding: 10px 20px; /* Button padding */
            border: none; /* Remove border */
            border-radius: 5px; /* Rounded corners */
            cursor: pointer; /* Pointer cursor */
            font-size: 16px; /* Font size */
            text-decoration: none; /* Remove underline from links */
            display: inline-block; /* Align link as a button */
        }
    </style>
</head>
<body>

    <h2>Select a Payment Option</h2>
    <a href="upi://pay?pa=8249210153@upi&pn=website&am=200&cu=INR" class="payment-button">Pay ₹200 via UPI</a>

    <!-- You can add more payment options below -->
    <!-- Example for PayPal (replace 'YOUR_PAYPAL_LINK' with your actual PayPal link) -->
    <!-- <a href="YOUR_PAYPAL_LINK" class="payment-button">Pay via PayPal</a> -->

    <!-- Example for Stripe (you would need to implement backend for this) -->
    <!-- <a href="/stripe-checkout" class="payment-button">Pay via Stripe</a> -->

</body>
</html>
